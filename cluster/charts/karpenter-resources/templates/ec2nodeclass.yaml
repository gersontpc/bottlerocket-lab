apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: {{ .Values.nodeClass.name }}
spec:
  amiFamily: {{ .Values.nodeClass.amiFamily }}
  associatePublicIPAddress: {{ .Values.nodeClass.associatePublicIPAddress }}
  instanceProfile: {{ .Values.nodeClass.instanceProfile }}
  amiSelectorTerms:
{{ toYaml .Values.nodeClass.amiSelectorTerms | indent 4 }}
  subnetSelectorTerms:
{{ toYaml .Values.nodeClass.subnetSelectorTerms | indent 4 }}
  securityGroupSelectorTerms:
{{ toYaml .Values.nodeClass.securityGroupSelectorTerms | indent 4 }}
  tags:
{{ toYaml .Values.nodeClass.tags | indent 4 }}
{{- if .Values.nodeClass.userData }}
  userData: |
{{ .Values.nodeClass.userData | indent 4 }}
{{- end }}